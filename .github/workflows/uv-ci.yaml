name: Build and Push UV App to GHCR

on:
  push:
    branches: [ "main" ]
    paths:
      - 'uv-in-action/**' # Only trigger if files in this sub-folder change

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # This will name your image: ghcr.io/username/repo-name/uv-app
          images: ghcr.io/${{ github.repository }}/uv-app
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # Point the context to the subdirectory
          context: ./uv-in-action
          file: ./uv-in-action/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Recommended: use GitHub Actions cache to speed up UV installs
          cache-from: type=gha
          cache-to: type=gha,mode=max