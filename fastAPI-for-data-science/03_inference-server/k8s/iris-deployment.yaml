apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-app
  labels:
    app: iris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iris
  template:
    metadata:
      labels:
        app: iris
    spec:
      containers:
      - name: iris-inference
        image: ghcr.io/cynicdog/python-clean-code-club/iris-inference:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: iris-service
spec:
  type: NodePort
  selector:
    app: iris
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 80